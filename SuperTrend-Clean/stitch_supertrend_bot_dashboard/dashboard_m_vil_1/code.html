<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SuperTrend Bot Mobile Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<h2 class="text-lg font-bold leading-tight flex-1 text-center">SuperTrend Bot</h2>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col gap-4 p-4 pb-24">
<!-- Key Metrics -->
<div class="flex flex-wrap gap-3">
<div class="flex min-w-[120px] flex-1 flex-col gap-2 rounded-xl bg-primary/10 border border-primary/20 p-4 items-center text-center">
<p class="text-2xl font-bold leading-tight">$12,450.00</p>
<p class="text-slate-600 dark:text-slate-400 text-sm">Total Balance</p>
</div>
<div class="flex min-w-[120px] flex-1 flex-col gap-2 rounded-xl bg-primary/10 border border-primary/20 p-4 items-center text-center">
<p class="text-green-600 dark:text-green-400 text-2xl font-bold leading-tight">+$340.50</p>
<p class="text-slate-600 dark:text-slate-400 text-sm">Daily PNL</p>
</div>
</div>
<!-- Bot Status -->
<div class="flex items-center gap-4 rounded-xl bg-white dark:bg-[#332219] p-4 shadow-sm border border-slate-200 dark:border-primary/20 justify-between">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center rounded-lg bg-primary/20 text-primary shrink-0 size-10">
<span class="material-symbols-outlined">monitoring</span>
</div>
<div>
<p class="text-base font-bold">Bot Status</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Running</p>
</div>
</div>
<div class="flex size-7 items-center justify-center">
<div class="size-3 rounded-full bg-green-500 animate-pulse"></div>
</div>
</div>
<!-- Active Signals -->
<div class="flex flex-col gap-3">
<h3 class="font-bold text-lg px-1">Active Signals</h3>
<div class="flex items-center gap-4 rounded-xl bg-white dark:bg-[#332219] p-4 shadow-sm border border-slate-200 dark:border-primary/20">
<div class="flex items-center justify-center rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 shrink-0 size-10">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div class="flex-1">
<p class="font-bold">Supertrend (15m)</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Buy Signal Active</p>
</div>
<p class="text-sm font-medium">10 mins ago</p>
</div>
<div class="flex items-center gap-4 rounded-xl bg-white dark:bg-[#332219] p-4 shadow-sm border border-slate-200 dark:border-primary/20">
<div class="flex items-center justify-center rounded-lg bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 shrink-0 size-10">
<span class="material-symbols-outlined">filter_alt</span>
</div>
<div class="flex-1">
<p class="font-bold">Trend Filter (60m)</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Uptrend Confirmed</p>
</div>
<p class="text-sm font-medium">1 hr ago</p>
</div>
</div>
<!-- Controls -->
<div class="flex flex-1 gap-3 mt-2">
<button class="flex-1 h-12 rounded-xl bg-primary hover:bg-primary/90 text-white font-bold transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">play_arrow</span>
                    Start
                </button>
<button class="flex-1 h-12 rounded-xl bg-slate-200 dark:bg-[#443025] hover:bg-slate-300 dark:hover:bg-[#553c2e] text-slate-800 dark:text-white font-bold transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">stop</span>
                    Stop
                </button>
</div>
</main>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 flex gap-2 border-t border-slate-200 dark:border-primary/20 bg-white dark:bg-[#221610] px-4 pb-6 pt-3 z-50">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[24px]">home</span>
<p class="text-xs font-medium">Dashboard</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">list_alt</span>
<p class="text-xs font-medium">Trades</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">settings</span>
<p class="text-xs font-medium">Settings</p>
</a>
</div>
</div>
</body></html>
